<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Tags</title>
</head>
<!-- Required: h, p, ol/ul>li, a[href=...], img -->
<body>
    <h1 style="text-align: center;">Main Page Header</h1>
    <section style="border: 1px solid black; border-radius: 2em; border-top: 4px solid burlywood; padding: 0.5em;">
        <h3>First Subsection</h3>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Autem expedita quasi vitae veritatis! Ipsam corrupti alias quo dolore, ducimus distinctio atque optio. Deleniti ipsam magnam reprehenderit vel animi voluptatum eligendi.</p>
    </section>
    <h3 style="border: 1px solid black; border-radius: 1em 0 1em 0; border-top: 4px solid burlywood; padding: 0.5em; text-align: center;">The &lt;img&gt; Tag</h3>
    <div style="border: 1px solid black; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 2vh;">
        <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?crop=entropy&cs=tinysrgb&fm=jpg&ixlib=rb-1.2.1&q=80&raw_url=true&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170" alt="coding-img" width="200">

    </div>
</body>
</html>
